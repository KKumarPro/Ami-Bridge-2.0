<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign In/Up - Ami Bridge</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-body">
    <a href="index.html" class="back-home">← Back</a>

    <div class="auth-wrapper">
      <div class="logo-auth">
        <div class="logo-box">AB</div>
      </div>

      <h2>Welcome to Ami-Bridge</h2>

      <div class="auth-card">
        <!-- SIGN IN FORM -->

        <div id="signin-form">
          <p class="subtitle" id="form-title">Choose your role and sign in</p>

          <p class="role-title">SIGN IN AS</p>

          <div class="role-selector">
            <button class="role active" onclick="selectRole(this)">
              Student
            </button>
            <button class="role" onclick="selectRole(this)">Mentor</button>
            <button class="role" onclick="selectRole(this)">Admin</button>
          </div>
          <label>Email</label>
          <input type="email" placeholder="Enter your email" />

          <label>Password</label>
          <input type="password" placeholder="Enter your password" />

          <button class="signup-btn">Sign In</button>

          <p class="signin-text">
            Don't have an account?
            <a href="#" onclick="showSignup()">Create account</a>
          </p>
        </div>

        <!-- SIGN UP FORM -->

        <div id="signup-form" style="display: none">
          <p class="subtitle" id="form-title">Choose your role and sign up</p>

          <p class="role-title">SIGN UP AS</p>

          <div class="role-selector">
            <button class="role active" onclick="selectRole(this)">
              Student
            </button>
            <button class="role" onclick="selectRole(this)">Mentor</button>
            <button class="role" onclick="selectRole(this)">Admin</button>
          </div>

          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" />

          <label>Email</label>
          <input type="email" placeholder="Enter your email" />

          <label>Password</label>
          <input type="password" placeholder="Create password" />

          <button class="signup-btn">Create Account</button>

          <p class="signin-text">
            Already have an account?
            <a href="#" onclick="showSignin()">Sign In</a>
          </p>
        </div>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
