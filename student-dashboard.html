<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Dashboard - Ami Bridge</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-box">AB</div>
          <span>Ami-Bridge</span>
        </div>

        <nav class="sidebar-menu">
          <a class="menu-item active">Dashboard</a>
          <a class="menu-item">Practice Interviews</a>
          <a class="menu-item">My Attempts</a>
          <a class="menu-item">Mentor Feedback</a>
          <a class="menu-item">Resume</a>
          <a class="menu-item">Profile</a>
        </nav>
      </aside>

      <!-- MAIN AREA -->

      <div class="main-area">
        <!-- TOP NAVBAR -->

        <header class="topbar">
          <h2>Student Dashboard</h2>

          <div class="topbar-user">
            <span class="user-name">Karan</span>

            <div class="user-avatar">K</div>
          </div>
        </header>

        <!-- CONTENT -->

        <main class="content">
          <h3>Welcome back 👋</h3>

          <p>Your placement preparation progress will appear here.</p>
        </main>
      </div>
    </div>
  </body>
</html>
