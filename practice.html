<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Practice Interviews - Ami Bridge</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-box">AB</div>
          <span>Ami-Bridge</span>
        </div>

        <nav class="sidebar-menu">
          <a class="menu-item" href="student-dashboard.html">Dashboard</a>
          <a class="menu-item active">Practice Interviews</a>
          <a class="menu-item">My Attempts</a>
          <a class="menu-item">Mentor Feedback</a>
          <a class="menu-item">Resume</a>
          <a class="menu-item">Profile</a>
        </nav>
      </aside>

      <!-- MAIN AREA -->

      <div class="main-area">
        <header class="topbar">
          <h2>Practice Interviews</h2>

          <div class="topbar-user">
            <span class="user-name">Karan</span>

            <div class="user-avatar">K</div>
          </div>
        </header>

        <main class="content">
          <h3>Select a Company</h3>

          <div class="company-grid">
            <div class="company-card">
              <h4>Google</h4>
              <p>DSA + System Design</p>
              <button
                class="start-btn"
                onclick="window.location.href = 'interview.html'"
              >
                Start Interview
              </button>
            </div>

            <div class="company-card">
              <h4>Amazon</h4>
              <p>DSA + Behavioral</p>
              <button class="start-btn">Start Interview</button>
            </div>

            <div class="company-card">
              <h4>Microsoft</h4>
              <p>DSA + Problem Solving</p>
              <button class="start-btn">Start Interview</button>
            </div>

            <div class="company-card">
              <h4>Flipkart</h4>
              <p>DSA + Coding</p>
              <button class="start-btn">Start Interview</button>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
