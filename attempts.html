<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Attempts - Ami Bridge</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-box">AB</div>
          <span>Ami-Bridge</span>
        </div>

        <nav class="sidebar-menu">
          <a class="menu-item" href="student-dashboard.html">Dashboard</a>
          <a class="menu-item" href="practice.html">Practice Interviews</a>
          <a class="menu-item active">My Attempts</a>

          <a class="menu-item" href="#">Profile</a>
        </nav>
      </aside>

      <!-- MAIN AREA -->

      <div class="main-area">
        <header class="topbar">
          <h2>My Interview Attempts</h2>

          <div class="topbar-user">
            <span class="user-name">Karan</span>

            <div class="user-avatar">K</div>
          </div>
        </header>

        <main class="content">
          <h3>All Interview Attempts</h3>

          <div class="attempts-page">
            <table class="attempts-table">
              <thead>
                <tr>
                  <th>Company</th>

                  <th>Score</th>
                  <th>Status</th>
                  <th>Details</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>Google</td>
                  <td>12 Mar 2026</td>
                  <td>85</td>
                  <td class="status pass">Pass</td>
                  <td>
                    <button
                      class="view-btn"
                      onclick="window.location.href = 'result.html'"
                    >
                      View
                    </button>
                  </td>
                </tr>

                <tr>
                  <td>Amazon</td>
                  <td>10 Mar 2026</td>
                  <td>72</td>
                  <td class="status pass">Pass</td>
                  <td>
                    <button
                      class="view-btn"
                      onclick="window.location.href = 'result.html'"
                    >
                      View
                    </button>
                  </td>
                </tr>

                <tr>
                  <td>Microsoft</td>
                  <td>8 Mar 2026</td>
                  <td>58</td>
                  <td class="status fail">Fail</td>
                  <td>
                    <button
                      class="view-btn"
                      onclick="window.location.href = 'result.html'"
                    >
                      View
                    </button>
                  </td>
                </tr>

                <tr>
                  <td>Flipkart</td>
                  <td>5 Mar 2026</td>
                  <td>76</td>
                  <td class="status pass">Pass</td>
                  <td>
                    <button
                      class="view-btn"
                      onclick="window.location.href = 'result.html'"
                    >
                      View
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
